<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Storage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f4f4;
            padding: 50px;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<div class="container">
    <h2 class="mb-4 text-center">☁️ Cloud Storage</h2>
    <form id="uploadForm" class="mb-4">
        <div class="mb-3">
            <label for="fileInput" class="form-label">Upload File</label>
            <input type="file" class="form-control" id="fileInput" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Upload</button>
    </form>
    <h4 class="mb-3">Actions</h4>
    <div class="input-group mb-3">
        <input id="fileId" class="form-control" placeholder="Enter File ID">
    </div>
    <div class="d-flex justify-content-between">
        <button class="btn btn-success w-100 me-2" onclick="download()">Download</button>
        <button class="btn btn-danger w-100 ms-2" onclick="deleteFile()">Delete</button>
    </div>
</div>
<script>
    document.getElementById("uploadForm").onsubmit = async function (e) {
        e.preventDefault();
        const file = document.getElementById("fileInput").files[0];
        const formData = new FormData();
        formData.append("file", file);
        const res = await fetch("/upload", {
            method: "POST",
            body: formData
        });
        const fileId = await res.text();
        alert("✅ Uploaded! File ID: " + fileId);
    };

    function download() {
        const id = document.getElementById("fileId").value;
        if (id.trim()) {
            window.open("/download/" + id);
        } else {
            alert("❗️ Please enter a File ID");
        }
    }

    async function deleteFile() {
        const id = document.getElementById("fileId").value;
        if (!id.trim()) {
            alert("❗️ Please enter a File ID");
            return;
        }

        await fetch("/delete/" + id, { method: "DELETE" });
        alert("🗑 Deleted");
    }
</script>
</body>
</html>
